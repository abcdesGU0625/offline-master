<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>視野收藏家 · 林口體育館</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">
<!-- Supabase JS SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root {
  --bg-a:#e8edf5;--bg-b:#edeaf5;--bg-c:#f2e8f0;
  --glass:rgba(255,255,255,0.52);--glass-hover:rgba(255,255,255,0.68);
  --glass-border:rgba(255,255,255,0.78);
  --glass-shadow:0 4px 24px rgba(140,130,180,0.10),0 1.5px 6px rgba(140,130,180,0.07);
  --accent:#9b91c8;--accent2:#c491b0;
  --text:#3c3852;--text-mid:#6e6890;--text-light:#a09cc0;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Noto Sans TC',sans-serif;
  min-height:100vh;overflow:hidden;
  background:linear-gradient(145deg,var(--bg-a) 0%,var(--bg-b) 48%,var(--bg-c) 100%);
  color:var(--text);user-select:none;
}
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
  background-size:180px;opacity:0.5;
}

/* ── AUTH SCREEN ── */
#auth-screen{
  position:fixed;inset:0;z-index:1000;
  display:flex;align-items:center;justify-content:center;
  background:linear-gradient(145deg,var(--bg-a),var(--bg-b),var(--bg-c));
}
.auth-card{
  background:rgba(252,252,255,0.88);
  backdrop-filter:blur(28px) saturate(1.6);
  border:1px solid rgba(255,255,255,0.82);
  border-radius:24px;padding:36px 32px 30px;
  width:380px;max-width:94vw;
  box-shadow:0 20px 60px rgba(100,90,160,0.16);
  animation:authIn 0.4s cubic-bezier(.16,1,.3,1) both;
}
@keyframes authIn{from{opacity:0;transform:translateY(16px) scale(0.97);}to{opacity:1;transform:none;}}
.auth-logo{
  text-align:center;margin-bottom:24px;
}
.auth-logo-icon{
  font-size:32px;margin-bottom:8px;
}
.auth-logo-title{
  font-family:'Playfair Display',serif;font-size:22px;color:var(--text);
}
.auth-logo-sub{
  font-size:11.5px;color:var(--text-light);margin-top:2px;letter-spacing:0.04em;
}
.auth-tabs{
  display:flex;gap:0;margin-bottom:22px;
  background:rgba(155,145,200,0.10);
  border-radius:12px;padding:3px;
}
.auth-tab{
  flex:1;padding:8px;border-radius:9px;text-align:center;
  font-size:13px;color:var(--text-mid);cursor:pointer;
  transition:background 0.18s,color 0.18s,box-shadow 0.18s;
}
.auth-tab.active{
  background:white;color:var(--accent);font-weight:500;
  box-shadow:0 1px 6px rgba(140,130,180,0.14);
}
.auth-field{margin-bottom:13px;}
.auth-label{font-size:10.5px;font-weight:500;color:var(--text-light);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:5px;}
.auth-input{
  width:100%;background:rgba(155,145,200,0.09);
  border:1px solid rgba(155,145,200,0.22);border-radius:11px;
  padding:10px 13px;font-size:13px;color:var(--text);
  font-family:'Noto Sans TC',sans-serif;outline:none;
  transition:border-color 0.15s,background 0.15s;
}
.auth-input:focus{border-color:var(--accent);background:rgba(155,145,200,0.13);}
.auth-input::placeholder{color:rgba(130,120,175,0.45);}
.auth-btn{
  width:100%;padding:12px;margin-top:6px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border:none;border-radius:13px;
  font-size:14px;color:white;font-weight:500;
  cursor:pointer;font-family:'Noto Sans TC',sans-serif;
  box-shadow:0 4px 14px rgba(155,145,200,0.32);
  transition:transform 0.15s,box-shadow 0.15s;
}
.auth-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(155,145,200,0.42);}
.auth-btn:disabled{opacity:0.6;cursor:not-allowed;transform:none;}
.auth-err{
  font-size:12px;color:#c06060;
  background:rgba(210,100,100,0.08);
  border-radius:9px;padding:8px 11px;
  margin-bottom:12px;display:none;
}
.auth-err.show{display:block;}
.auth-btn-google{
  width:100%;padding:11px 16px;margin-bottom:4px;
  background:white;
  border:1px solid rgba(155,145,200,0.30);border-radius:13px;
  font-size:13.5px;color:var(--text);font-weight:500;
  cursor:pointer;font-family:'Noto Sans TC',sans-serif;
  display:flex;align-items:center;justify-content:center;gap:10px;
  box-shadow:0 2px 8px rgba(140,130,180,0.10);
  transition:background 0.15s,box-shadow 0.15s,transform 0.15s;
}
.auth-btn-google:hover{
  background:rgba(250,250,255,1);
  box-shadow:0 4px 14px rgba(140,130,180,0.18);
  transform:translateY(-1px);
}
.auth-btn-google:disabled{opacity:0.6;cursor:not-allowed;transform:none;}
.auth-divider{
  text-align:center;margin:14px 0 10px;
  font-size:11px;color:var(--text-light);position:relative;
}
.auth-divider::before,.auth-divider::after{
  content:'';position:absolute;top:50%;width:34%;height:1px;
  background:rgba(155,145,200,0.22);
}
.auth-divider::before{left:0;}
.auth-divider::after{right:0;}
.auth-setup{
  margin-top:16px;padding-top:14px;
  border-top:1px solid rgba(155,145,200,0.15);
}
.auth-setup-title{font-size:11px;color:var(--text-light);margin-bottom:8px;text-align:center;}
.setup-step{
  background:rgba(155,145,200,0.07);border-radius:10px;
  padding:10px 12px;margin-bottom:7px;font-size:11.5px;color:var(--text-mid);
  line-height:1.6;
}
.setup-step code{
  background:rgba(155,145,200,0.18);border-radius:5px;
  padding:1px 5px;font-size:11px;font-family:monospace;color:var(--accent);
  word-break:break-all;
}

/* ── SIDEBAR ── */
.sidebar{
  position:fixed;left:14px;top:14px;z-index:200;width:172px;
  background:var(--glass);backdrop-filter:blur(20px) saturate(1.4);
  border:1px solid var(--glass-border);border-radius:18px;
  box-shadow:var(--glass-shadow);padding:16px 14px;
  animation:fadeLeft 0.5s cubic-bezier(.16,1,.3,1) both;
}
@keyframes fadeLeft{from{opacity:0;transform:translateX(-14px);}to{opacity:1;transform:none;}}
.user-row{
  display:flex;align-items:center;gap:9px;
  padding-bottom:13px;margin-bottom:10px;
  border-bottom:1px solid rgba(160,155,210,0.18);
}
.avatar{
  width:34px;height:34px;border-radius:50%;
  background:linear-gradient(135deg,#b5aee0,#d8a8c8);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;flex-shrink:0;box-shadow:0 2px 8px rgba(155,145,200,0.25);
}
.username{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:112px;}
.nav-item{
  padding:7px 9px;border-radius:10px;font-size:12.5px;
  color:var(--text-mid);cursor:pointer;
  transition:background 0.18s,color 0.18s;margin-bottom:1px;
}
.nav-item:hover{background:rgba(155,145,200,0.14);color:var(--text);}
.nav-item.active{background:rgba(155,145,200,0.18);color:var(--accent);font-weight:500;}
.nav-item.logout{color:#c08080;margin-top:6px;}
.nav-item.logout:hover{background:rgba(210,110,110,0.10);color:#b06060;}

/* ── TOP BAR ── */
.topbar{
  position:fixed;top:14px;left:50%;transform:translateX(-50%);
  display:flex;gap:8px;align-items:center;z-index:200;
  animation:fadeDown 0.5s cubic-bezier(.16,1,.3,1) both;
}
@keyframes fadeDown{from{opacity:0;transform:translateX(-50%) translateY(-12px);}to{opacity:1;transform:translateX(-50%);}}
.pill{
  background:var(--glass);backdrop-filter:blur(20px) saturate(1.4);
  border:1px solid var(--glass-border);border-radius:100px;
  padding:9px 16px;display:flex;align-items:center;gap:8px;
  box-shadow:var(--glass-shadow);font-size:12.5px;cursor:pointer;
  transition:background 0.18s;white-space:nowrap;
}
.pill:hover{background:var(--glass-hover);}
.pill-label{color:var(--text-light);font-size:11px;}
.pill-value{color:var(--text);font-weight:500;}
.pill-sep{width:1px;height:14px;background:rgba(155,145,200,0.3);}
.pill-arrow{color:var(--text-light);font-size:10px;}
.btn-new{
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border:none;border-radius:100px;padding:9px 16px;
  color:white;font-size:12.5px;font-weight:500;
  cursor:pointer;font-family:'Noto Sans TC',sans-serif;
  box-shadow:0 3px 12px rgba(155,145,200,0.30);
  display:flex;align-items:center;gap:5px;
  transition:transform 0.15s,box-shadow 0.15s;
}
.btn-new:hover{transform:translateY(-1px);box-shadow:0 5px 18px rgba(155,145,200,0.38);}

/* ── RIGHT PANEL ── */
.right-panel{
  position:fixed;right:14px;top:72px;z-index:200;
  display:flex;flex-direction:column;gap:8px;align-items:flex-end;
  animation:fadeRight 0.5s cubic-bezier(.16,1,.3,1) both;
}
@keyframes fadeRight{from{opacity:0;transform:translateX(14px);}to{opacity:1;transform:none;}}
.settings-card{
  background:var(--glass);backdrop-filter:blur(20px) saturate(1.4);
  border:1px solid var(--glass-border);border-radius:15px;
  padding:13px 14px;box-shadow:var(--glass-shadow);width:152px;
}
.settings-head{
  font-size:11px;font-weight:500;color:var(--text-light);
  letter-spacing:0.05em;text-transform:uppercase;margin-bottom:11px;
}
.settings-row{
  display:flex;align-items:center;justify-content:space-between;
  font-size:12px;color:var(--text-mid);margin-bottom:9px;
}
.settings-row:last-child{margin-bottom:0;}
.toggle{
  width:32px;height:18px;border-radius:9px;
  background:rgba(155,145,200,0.22);position:relative;
  cursor:pointer;transition:background 0.22s;flex-shrink:0;
}
.toggle.on{background:linear-gradient(90deg,var(--accent),var(--accent2));}
.toggle::after{
  content:'';position:absolute;top:2px;left:2px;
  width:14px;height:14px;border-radius:50%;background:white;
  box-shadow:0 1px 4px rgba(100,90,160,0.18);
  transition:transform 0.22s cubic-bezier(.16,1,.3,1);
}
.toggle.on::after{transform:translateX(14px);}
.zoom-group{display:flex;flex-direction:column;gap:5px;}
.zoom-btn{
  width:36px;height:36px;background:var(--glass);
  backdrop-filter:blur(20px);border:1px solid var(--glass-border);
  border-radius:11px;box-shadow:var(--glass-shadow);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:17px;color:var(--accent);
  transition:background 0.15s,transform 0.1s;font-weight:300;
}
.zoom-btn:hover{background:var(--glass-hover);transform:scale(1.06);}
.zoom-btn:active{transform:scale(0.95);}

/* ── PIN SOURCE ── */
.pin-source-wrap{
  position:fixed;right:20px;bottom:26px;z-index:210;
  display:flex;flex-direction:column;align-items:center;gap:6px;
}
.pin-source{
  width:50px;height:50px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;align-items:center;justify-content:center;
  cursor:grab;box-shadow:0 5px 20px rgba(155,145,200,0.38);
  transition:transform 0.2s;animation:ppulse 3s ease-in-out infinite;
}
@keyframes ppulse{
  0%,100%{box-shadow:0 5px 20px rgba(155,145,200,0.38);}
  50%{box-shadow:0 5px 28px rgba(155,145,200,0.55);}
}
.pin-source:hover{transform:scale(1.07);}
.pin-source:active{cursor:grabbing;transform:scale(0.94);animation:none;}
.pin-source svg{pointer-events:none;}
.pin-hint-label{
  font-size:10.5px;color:var(--text-light);
  background:var(--glass);backdrop-filter:blur(12px);
  border:1px solid var(--glass-border);border-radius:8px;
  padding:4px 9px;white-space:nowrap;box-shadow:var(--glass-shadow);
}

/* ── MAP ── */
#map-container{
  position:fixed;inset:0;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;cursor:grab;
}
#map-container.panning{cursor:grabbing;}
#map-scaler{
  position:relative;transform-origin:center center;will-change:transform;
}
#venue-svg{
  display:block;
  filter:drop-shadow(0 8px 32px rgba(120,115,180,0.10));
}
.sv-block{cursor:pointer;transition:opacity 0.15s;}
.sv-block:hover{opacity:0.78;}
.seat-overlay{display:none;pointer-events:none;}
#pins-layer{
  position:absolute;top:0;left:0;
  width:581px;height:585px;pointer-events:none;
}
.map-pin{
  position:absolute;pointer-events:all;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;
  transform-origin:bottom center;transition:filter 0.15s;
}
.map-pin:hover{filter:drop-shadow(0 4px 10px rgba(140,130,200,0.50));z-index:99 !important;}
.pin-body{
  width:40px;height:40px;
  border-radius:50% 50% 50% 0;transform:rotate(-45deg);
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border:2.5px solid rgba(255,255,255,0.9);
  box-shadow:0 3px 12px rgba(140,130,200,0.35);
  overflow:hidden;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.pin-body img{width:100%;height:100%;object-fit:cover;transform:rotate(45deg);}
.pin-body .pin-icon{transform:rotate(45deg);font-size:17px;}
.pin-dot{width:5px;height:5px;border-radius:50%;background:rgba(140,130,200,0.45);margin-top:2px;}
#drag-ghost{position:fixed;pointer-events:none;z-index:9999;display:none;transform:translate(-50%,-100%);}

/* ── LOADING OVERLAY ── */
#loading-overlay{
  position:fixed;inset:0;z-index:900;
  background:rgba(232,237,245,0.7);backdrop-filter:blur(8px);
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity 0.2s;
}
#loading-overlay.show{opacity:1;pointer-events:all;}
.spinner{
  width:36px;height:36px;border-radius:50%;
  border:3px solid rgba(155,145,200,0.2);
  border-top-color:var(--accent);
  animation:spin 0.7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── MODAL ── */
.overlay{
  position:fixed;inset:0;z-index:500;
  background:rgba(50,45,80,0.18);backdrop-filter:blur(7px);
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity 0.22s;
}
.overlay.open{opacity:1;pointer-events:all;}
.modal{
  background:rgba(252,252,255,0.90);backdrop-filter:blur(28px) saturate(1.6);
  border:1px solid rgba(255,255,255,0.82);border-radius:22px;
  padding:26px 24px 22px;width:370px;max-width:94vw;
  box-shadow:0 20px 60px rgba(100,90,160,0.16),0 4px 16px rgba(100,90,160,0.08);
  transform:translateY(12px) scale(0.97);
  transition:transform 0.28s cubic-bezier(.16,1,.3,1);
}
.overlay.open .modal{transform:none;}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.modal-title{font-family:'Playfair Display',serif;font-size:19px;color:var(--text);}
.close-btn{
  width:28px;height:28px;border-radius:50%;
  background:rgba(155,145,200,0.14);border:none;cursor:pointer;
  color:var(--text-mid);font-size:14px;
  display:flex;align-items:center;justify-content:center;transition:background 0.15s;
}
.close-btn:hover{background:rgba(155,145,200,0.26);}
.field-label{font-size:10.5px;font-weight:500;color:var(--text-light);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:5px;}
.field-wrap{margin-bottom:13px;}
.upload-zone{
  border:1.5px dashed rgba(155,145,200,0.38);border-radius:12px;
  padding:18px;text-align:center;cursor:pointer;
  transition:border-color 0.18s,background 0.18s;position:relative;overflow:hidden;
}
.upload-zone:hover{border-color:var(--accent);background:rgba(155,145,200,0.06);}
.upload-zone.has-img{padding:0;border-style:solid;border-color:rgba(155,145,200,0.4);}
.upload-zone img{width:100%;height:148px;object-fit:cover;border-radius:10px;display:block;}
.upload-zone input{display:none;}
.upload-icon{font-size:24px;margin-bottom:6px;}
.upload-text{font-size:12.5px;color:var(--text-mid);}
.upload-sub{font-size:11px;color:var(--text-light);margin-top:2px;}
.m-input{
  width:100%;background:rgba(155,145,200,0.09);
  border:1px solid rgba(155,145,200,0.22);border-radius:11px;
  padding:9px 12px;font-size:12.5px;color:var(--text);
  font-family:'Noto Sans TC',sans-serif;outline:none;resize:none;
  transition:border-color 0.15s,background 0.15s;
}
.m-input:focus{border-color:var(--accent);background:rgba(155,145,200,0.13);}
.m-input::placeholder{color:rgba(130,120,175,0.45);}
.modal-footer{display:flex;gap:8px;margin-top:18px;}
.btn-cancel{
  flex:1;padding:10px;background:rgba(155,145,200,0.12);
  border:none;border-radius:12px;font-size:13px;color:var(--text-mid);
  cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:background 0.15s;
}
.btn-cancel:hover{background:rgba(155,145,200,0.22);}
.btn-save{
  flex:2;padding:10px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border:none;border-radius:12px;font-size:13px;color:white;font-weight:500;
  cursor:pointer;font-family:'Noto Sans TC',sans-serif;
  box-shadow:0 3px 12px rgba(155,145,200,0.28);transition:transform 0.15s,box-shadow 0.15s;
}
.btn-save:hover{transform:translateY(-1px);box-shadow:0 5px 16px rgba(155,145,200,0.38);}
.btn-save:disabled{opacity:0.6;cursor:not-allowed;transform:none;}
.btn-del{
  padding:10px 13px;background:rgba(210,110,110,0.10);border:none;
  border-radius:12px;font-size:12px;color:#b06060;
  cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:background 0.15s;
}
.btn-del:hover{background:rgba(210,110,110,0.20);}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:88px;left:50%;
  transform:translateX(-50%) translateY(12px);
  background:rgba(55,50,90,0.82);backdrop-filter:blur(12px);
  color:white;font-size:12.5px;padding:8px 18px;
  border-radius:100px;opacity:0;pointer-events:none;
  transition:all 0.26s;white-space:nowrap;z-index:600;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<!-- ══ AUTH SCREEN ══ -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">📍</div>
      <div class="auth-logo-title">視野收藏家</div>
      <div class="auth-logo-sub">林口體育館 · Concert View Collector</div>
    </div>

    <div class="auth-err" id="auth-err"></div>

    <!-- Google 登入按鈕 -->
    <button class="auth-btn-google" id="google-btn" onclick="handleGoogleLogin()">
      <svg width="18" height="18" viewBox="0 0 48 48" style="flex-shrink:0">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        <path fill="none" d="M0 0h48v48H0z"/>

}

async function handleAuth() {
  if (!sbClient) { showAuthErr('請先完成 Supabase 設定 ↓'); return; }
  const email = document.getElementById('auth-email').value.trim();
  const pass  = document.getElementById('auth-password').value;
  if (!email || !pass) { showAuthErr('請填入 Email 和密碼'); return; }

  const btn = document.getElementById('auth-btn');
  btn.disabled = true;
  btn.textContent = '處理中...';
  hideAuthErr();

  try {
    let result;
    if (currentTab === 'login') {
      result = await sbClient.auth.signInWithPassword({ email, password: pass });
    } else {
      result = await sbClient.auth.signUp({ email, password: pass });
    }
    if (result.error) throw result.error;
    if (currentTab === 'signup' && !result.data.session) {
      showAuthErr('註冊成功！請到 Email 確認信箱後再登入。');
      btn.disabled = false; btn.textContent = '登入';
      switchTab('login'); return;
    }
    currentUser = result.data.user;
    await enterApp();
  } catch(e) {
    const msg = e.message || '登入失敗';
    showAuthErr(msg.includes('Invalid login') ? 'Email 或密碼錯誤' :
                msg.includes('already registered') ? '此 Email 已註冊' : msg);
    btn.disabled = false;
    btn.textContent = currentTab === 'login' ? '登入' : '註冊帳號';
  }
}

async function handleGoogleLogin() {
  if (!sbClient) { showAuthErr('請先完成 Supabase 設定 ↓'); return; }
  const btn = document.getElementById('google-btn');
  btn.disabled = true;
  btn.querySelector('svg').style.opacity = '0.5';
  try {
    const { error } = await sbClient.auth.signInWithOAuth({
      provider: 'google',
      options: { redirectTo: window.location.href }
    });
    if (error) throw error;
    // Browser will redirect to Google — no further action needed here
  } catch(e) {
    showAuthErr(e.message || 'Google 登入失敗，請稍後再試');
    btn.disabled = false;
    btn.querySelector('svg').style.opacity = '1';
  }
}


  setLoading(true);
  await sbClient.auth.signOut();
  currentUser = null; pins = [];
  document.getElementById('app').style.display = 'none';
  document.getElementById('auth-screen').style.display = 'flex';
  setLoading(false);
}

function showAuthErr(msg) {
  const el = document.getElementById('auth-err');
  el.textContent = msg; el.classList.add('show');
}
function hideAuthErr() {
  document.getElementById('auth-err').classList.remove('show');
}

// ════════════════════════════════════════════════════════
//  APP INIT  — called after successful login
// ════════════════════════════════════════════════════════
async function enterApp() {
  setLoading(true);
  // Show username (use email prefix)
  const email = currentUser.email || '';
  document.getElementById('display-name').textContent = email.split('@')[0];

  // Load pins from Supabase
  await loadPins();

  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  applyTransform(false);
  renderPins();
  setLoading(false);
}

// ════════════════════════════════════════════════════════
//  PIN DATA  — Supabase CRUD
// ════════════════════════════════════════════════════════
let pins = [];

async function loadPins() {
  const { data, error } = await sbClient
    .from('pins')
    .select('*')
    .order('created_at', { ascending: true });
  if (error) { console.error(error); return; }
  pins = data || [];
}

async function dbInsertPin(pin) {
  const { data, error } = await sbClient
    .from('pins')
    .insert({ user_id: currentUser.id, x: pin.x, y: pin.y, url: pin.url, note: pin.note, img: pin.img })
    .select()
    .single();
  if (error) throw error;
  return data;
}

async function dbUpdatePin(pin) {
  const { error } = await sbClient
    .from('pins')
    .update({ url: pin.url, note: pin.note, img: pin.img })
    .eq('id', pin.id);
  if (error) throw error;
}

async function dbDeletePin(id) {
  const { error } = await sbClient.from('pins').delete().eq('id', id);
  if (error) throw error;
}

// ════════════════════════════════════════════════════════
//  MAP STATE
// ════════════════════════════════════════════════════════
let scale = 1, panX = 0, panY = 0;
const MIN_S = 0.4, MAX_S = 3.5;
let isPanning = false, panStartX = 0, panStartY = 0, dragMoved = false;
let pendingPin = null, editingId = null;
let showSections = true, showSeats = false;
let isDraggingPin = false;

const mapContainer = document.getElementById('map-container');
const scaler       = document.getElementById('map-scaler');
const pinsLayer    = document.getElementById('pins-layer');
const overlay      = document.getElementById('overlay');

function applyTransform(animate) {
  scaler.style.transition = animate ? 'transform 0.15s cubic-bezier(.16,1,.3,1)' : 'none';
  scaler.style.transform  = `translate(${panX}px,${panY}px) scale(${scale})`;
  document.querySelectorAll('.map-pin').forEach(el => {
    el.style.transform = `translate(-50%,-100%) scale(${1/scale})`;
  });
}

function doZoom(d) {
  scale = Math.min(MAX_S, Math.max(MIN_S, scale + d));
  applyTransform(true);
}

mapContainer.addEventListener('wheel', e => {
  e.preventDefault(); doZoom(e.deltaY < 0 ? 0.1 : -0.1);
}, { passive: false });

mapContainer.addEventListener('mousedown', e => {
  if (e.target.closest('.map-pin') || e.target.closest('.pin-source') || e.target.closest('.overlay')) return;
  if (isDraggingPin) return;
  isPanning = true; dragMoved = false;
  panStartX = e.clientX - panX; panStartY = e.clientY - panY;
  mapContainer.classList.add('panning'); e.preventDefault();
});
window.addEventListener('mousemove', e => {
  if (!isPanning) return;
  const dx = e.clientX - panStartX, dy = e.clientY - panStartY;
  if (Math.abs(dx - panX) > 3 || Math.abs(dy - panY) > 3) dragMoved = true;
  panX = dx; panY = dy; applyTransform(false);
});
window.addEventListener('mouseup', () => {
  if (!isPanning) return;
  isPanning = false; mapContainer.classList.remove('panning');
});

function pinDragStart(e) {
  isDraggingPin = true;
  document.getElementById('drag-ghost').style.display = 'block';
  e.dataTransfer.setDragImage(document.getElementById('drag-ghost'), 20, 40);
  e.dataTransfer.effectAllowed = 'copy';
}
function pinDragEnd() {
  isDraggingPin = false;
  document.getElementById('drag-ghost').style.display = 'none';
}

function handleDrop(e) {
  e.preventDefault();
  const r = scaler.getBoundingClientRect();
  const x = Math.max(0, Math.min(581, (e.clientX - r.left) / scale));
  const y = Math.max(0, Math.min(585, (e.clientY - r.top)  / scale));
  pendingPin = { x, y }; editingId = null; openModal(false);
}

// ════════════════════════════════════════════════════════
//  MODAL
// ════════════════════════════════════════════════════════
function openModal(isEdit) {
  document.getElementById('m-url').value = '';
  document.getElementById('m-note').value = '';
  document.getElementById('upload-preview').style.display = 'none';
  document.getElementById('upload-ph').style.display = 'block';
  document.getElementById('upload-zone').classList.remove('has-img');
  document.getElementById('file-in').value = '';
  window._imgData = null;

  document.getElementById('modal-title').textContent = isEdit ? '編輯視野圖' : '新增視野圖';
  const footer = document.getElementById('modal-footer');

  if (isEdit) {
    const pin = pins.find(p => p.id === editingId);
    if (pin) {
      document.getElementById('m-url').value  = pin.url  || '';
      document.getElementById('m-note').value = pin.note || '';
      if (pin.img) { showPreview(pin.img); window._imgData = pin.img; }
    }
    footer.innerHTML = `
      <button class="btn-del"    onclick="deletePin()">刪除</button>
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-save"   id="save-btn" onclick="savePin()">儲存</button>`;
  } else {
    footer.innerHTML = `
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-save"   id="save-btn" onclick="savePin()">儲存</button>`;
  }
  overlay.classList.add('open');
}
function closeModal() {
  overlay.classList.remove('open');
  pendingPin = null; editingId = null;
}
overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

function handleImg(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      const MAX = 1200;
      let w = img.width, h = img.height;
      if (w > MAX) { h = Math.round(h * MAX / w); w = MAX; }
      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      window._imgData = c.toDataURL('image/jpeg', 0.72);
      showPreview(window._imgData);
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}
function showPreview(src) {
  document.getElementById('upload-preview').src = src;
  document.getElementById('upload-preview').style.display = 'block';
  document.getElementById('upload-ph').style.display = 'none';
  document.getElementById('upload-zone').classList.add('has-img');
}

async function savePin() {
  const url  = document.getElementById('m-url').value.trim();
  const note = document.getElementById('m-note').value.trim();
  const img  = window._imgData || null;
  const btn  = document.getElementById('save-btn');
  btn.disabled = true; btn.textContent = '儲存中…';
  try {
    if (editingId) {
      const i = pins.findIndex(p => p.id === editingId);
      if (i !== -1) {
        pins[i] = { ...pins[i], url, note, img };
        await dbUpdatePin(pins[i]);
      }
    } else if (pendingPin) {
      const newPin = await dbInsertPin({ x: pendingPin.x, y: pendingPin.y, url, note, img });
      pins.push(newPin);
    }
    closeModal(); renderPins(); showToast('✨ 視野圖已儲存');
  } catch(e) {
    console.error(e);
    showToast('⚠️ 儲存失敗，請稍後再試');
    btn.disabled = false; btn.textContent = '儲存';
  }
}

async function deletePin() {
  setLoading(true);
  try {
    await dbDeletePin(editingId);
    pins = pins.filter(p => p.id !== editingId);
    closeModal(); renderPins(); showToast('已刪除');
  } catch(e) {
    showToast('⚠️ 刪除失敗');
  }
  setLoading(false);
}

// ════════════════════════════════════════════════════════
//  RENDER PINS
// ════════════════════════════════════════════════════════
function renderPins() {
  pinsLayer.innerHTML = '';
  pins.forEach((pin, i) => {
    const el = document.createElement('div');
    el.className = 'map-pin';
    el.style.cssText = `left:${pin.x}px;top:${pin.y}px;z-index:${10+i};`+
      `transform:translate(-50%,-100%) scale(${1/scale});transform-origin:bottom center;`;
    const body = document.createElement('div'); body.className = 'pin-body';
    if (pin.img) {
      const img = document.createElement('img'); img.src = pin.img; body.appendChild(img);
    } else {
      const ic = document.createElement('div'); ic.className = 'pin-icon'; ic.textContent = '📍'; body.appendChild(ic);
    }
    const dot = document.createElement('div'); dot.className = 'pin-dot';
    el.appendChild(body); el.appendChild(dot);
    el.addEventListener('click', () => { editingId = pin.id; pendingPin = null; openModal(true); });
    pinsLayer.appendChild(el);
  });
}

// ════════════════════════════════════════════════════════
//  SETTINGS TOGGLES
// ════════════════════════════════════════════════════════
function togSetting(t) {
  if (t === 'seats') {
    showSeats = !showSeats;
    document.getElementById('tog-seats').classList.toggle('on', showSeats);
    document.querySelectorAll('.seat-overlay').forEach(el => {
      el.style.display = showSeats ? 'block' : 'none';
    });
  } else {
    showSections = !showSections;
    document.getElementById('tog-sections').classList.toggle('on', showSections);
    document.querySelectorAll('.section-label').forEach(el => {
      el.style.display = showSections ? '' : 'none';
    });
  }
}

// ════════════════════════════════════════════════════════
//  UTILS
// ════════════════════════════════════════════════════════
function setLoading(on) {
  document.getElementById('loading-overlay').classList.toggle('show', on);
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}

// ════════════════════════════════════════════════════════
//  BOOT
// ════════════════════════════════════════════════════════
(async () => {
  const ready = initSupabase();

  setLoading(true);

  // Handle OAuth callback — Supabase puts tokens in the URL hash after Google redirect
  // getSession() automatically picks them up
  const { data: { session } } = await sbClient.auth.getSession();

  if (session) {
    currentUser = session.user;
    // Clean up the URL hash so tokens don't stay in the address bar
    if (window.location.hash) history.replaceState(null, '', window.location.pathname);
    await enterApp();
  } else {
    setLoading(false);
  }
})();
</script>
